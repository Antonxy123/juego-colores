<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Colores</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="contenedor">

    <h1>🎨 Juego de los Colores 🎨</h1>

    <h2 id="pregunta">Haz clic en el color ROJO</h2>

    <p>Puntaje: <span id="puntaje">0</span></p>

    <div class="colores">

        <button class="color rojo" onclick="respuesta('rojo')"></button>

        <button class="color azul" onclick="respuesta('azul')"></button>

        <button class="color verde" onclick="respuesta('verde')"></button>

        <button class="color amarillo" onclick="respuesta('amarillo')"></button>

    </div>

    <h2 id="mensaje"></h2>

</div>

<script src="script.js"></script>

</body>
</html>
